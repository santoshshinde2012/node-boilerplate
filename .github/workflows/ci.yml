name: CI
on:
  push:
    branches:
      - main
      - master
      - dev
      - release-*
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - dev
      - release-*

permissions:
  contents: read

jobs:
  CI:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Type-check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Audit production dependencies
      run: npm run audit:prod

    - name: Build
      run: npm run build --if-present

    - name: Test
      run: npm test

    # Coverage / Sonar are reported only from the primary matrix slot to avoid
    # duplicate uploads.
    - name: CodeClimate Scan
      if: matrix.node-version == '20.x'
      uses: paambaati/codeclimate-action@v6.0.0
      env:
        CC_TEST_REPORTER_ID: ${{ secrets.CC_TOKEN }}
      with:
        coverageLocations: |
          ${{ github.workspace }}/coverage/*.info:lcov
          ${{ github.workspace }}/coverage/clover.xml:clover
        debug: true

    - name: SonarCloud Scan
      if: matrix.node-version == '20.x'
      uses: SonarSource/sonarcloud-github-action@master
      with:
        args: >
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=santoshshinde2012
          -Dsonar.projectKey=santoshshinde2012_node-boilerplate
          -Dsonar.projectName=node-boilerplate
          -Dsonar.projectVersion=1.0
          -Dsonar.language=ts
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.test.inclusions=**/tests/**/*.ts
          -Dsonar.coverage.exclusions=**/tests/**/*.ts,**/src/server.ts,node_modules/*,coverage/lcov-report/*,jest.config.ts
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.testExecutionReportPaths=coverage/sonar-report.xml
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.verbose=false
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
